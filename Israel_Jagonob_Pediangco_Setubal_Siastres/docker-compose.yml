version: "3.8"

services:

  web:
    build: .
    container_name: himakas_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: himakas_db
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: himakas_db

    ports:
      - "3307:3306"

    volumes:
      - db_data:/var/lib/mysql
      - ./himakas_db.sql:/docker-entrypoint-initdb.d/himakas_db.sql

volumes:
  db_data: